<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08080a;
      --surface: #131316;
      --surface-2: #1b1b1f;
      --border: #29292f;
      --text: #f5f5f7;
      --text-dim: #88888f;
      --accent: #c8f135;
      --accent-soft: rgba(200,241,53,0.1);
      --danger: #ff5470;
      --radius: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(700px circle at 15% 0%, rgba(200,241,53,0.06), transparent 50%),
        radial-gradient(600px circle at 100% 100%, rgba(120,90,255,0.05), transparent 50%);
      pointer-events: none; z-index: 0;
    }
    .wrap { position: relative; z-index: 1; }

    /* ===== AUTH (centered) ===== */
    .auth-screen {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .auth-card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }
    .auth-brand {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 28px;
    }
    .logo {
      width: 46px; height: 46px;
      background: var(--accent);
      border-radius: 13px;
      display: grid; place-items: center;
      font-size: 24px;
      box-shadow: 0 8px 24px rgba(200,241,53,0.25);
    }
    .auth-brand h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .auth-brand .sub { font-size: 12px; color: var(--text-dim); font-weight: 500; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-dim); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    input {
      width: 100%; padding: 13px 15px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 11px; color: var(--text);
      font-size: 15px; font-family: inherit; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    input::placeholder { color: #525259; }

    button { font-family: inherit; cursor: pointer; border: none; border-radius: 11px; font-weight: 600; transition: transform .08s, background .15s, color .15s; }
    button:active { transform: scale(0.98); }
    .btn-primary {
      width: 100%; padding: 14px;
      background: var(--accent); color: #08080a;
      font-size: 15px; font-weight: 700; margin-top: 6px;
    }
    .btn-primary:hover { background: #d6ff48; }
    .btn-ghost {
      width: 100%; padding: 12px; background: transparent;
      color: var(--text-dim); border: 1px solid var(--border);
      font-size: 14px; margin-top: 10px;
    }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); }

    .msg { font-size: 13px; margin-top: 12px; font-weight: 500; min-height: 18px; }
    .msg.error { color: var(--danger); }
    .msg.success { color: var(--accent); }

    /* ===== APP (dashboard) ===== */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: rgba(8,8,10,0.8);
      backdrop-filter: blur(12px);
      z-index: 5;
    }
    .topbar .left { display: flex; align-items: center; gap: 12px; }
    .topbar h1 { font-size: 17px; font-weight: 800; letter-spacing: -0.3px; }
    .topbar .logo { width: 38px; height: 38px; font-size: 20px; box-shadow: none; }
    .topbar .right { display: flex; align-items: center; gap: 16px; }
    .topbar .who { font-size: 14px; color: var(--text-dim); font-weight: 500; }
    .topbar .who b { color: var(--text); font-weight: 600; }
    .logout-btn {
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text-dim); padding: 9px 16px; font-size: 13px;
    }
    .logout-btn:hover { color: var(--text); }

    .dashboard {
      max-width: 1080px; margin: 0 auto;
      padding: 32px;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 820px) {
      .dashboard { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 26px;
    }
    .panel-title {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-dim); margin-bottom: 18px;
    }

    .sidebar { display: flex; flex-direction: column; gap: 24px; position: sticky; top: 96px; }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 22px; }
    .stat {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 14px; padding: 18px;
    }
    .stat .num { font-size: 34px; font-weight: 900; letter-spacing: -1.5px; color: var(--accent); line-height: 1; }
    .stat .label { font-size: 12px; color: var(--text-dim); font-weight: 500; margin-top: 6px; }

    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }

    .workout {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px; background: var(--surface-2);
      border: 1px solid var(--border); border-radius: 13px;
      margin-bottom: 10px; animation: slideIn .25s ease;
    }
    @keyframes slideIn { from { opacity:0; transform: translateY(8px);} to {opacity:1; transform: translateY(0);} }
    .workout:last-child { margin-bottom: 0; }
    .workout .left { display: flex; align-items: center; gap: 14px; }
    .workout .icon {
      width: 42px; height: 42px; background: var(--accent-soft);
      border-radius: 11px; display: grid; place-items: center; font-size: 19px;
    }
    .workout .name { font-size: 15px; font-weight: 600; }
    .workout .reps { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    .workout .reps b { color: var(--accent); font-weight: 700; }
    .btn-del {
      background: transparent; color: var(--text-dim); padding: 8px;
      border-radius: 9px; font-size: 17px; line-height: 1; width: 36px; height: 36px;
    }
    .btn-del:hover { background: rgba(255,84,112,0.12); color: var(--danger); }

    .empty { text-align: center; padding: 56px 20px; color: var(--text-dim); font-size: 14px; }
    .empty .big { font-size: 44px; margin-bottom: 14px; }

    .hidden { display: none; }
  </style>
</head>
<body>
<div class="wrap">

  <!-- ===== AUTH ===== -->
  <div id="auth" class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="logo">🏋️</div>
        <div>
          <h1>Workout Tracker</h1>
          <div class="sub">Track every rep</div>
        </div>
      </div>

      <div class="field">
        <label>Username</label>
        <input id="username" type="text" placeholder="your_username" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••" />
      </div>

      <button class="btn-primary" id="auth-submit" onclick="submitAuth()">Sign in</button>
      <button class="btn-ghost" id="auth-toggle" onclick="toggleAuth()">New here? Create account</button>
      <p class="msg" id="auth-msg"></p>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="app" class="hidden">
    <div class="topbar">
      <div class="left">
        <div class="logo">🏋️</div>
        <h1>Workout Tracker</h1>
      </div>
      <div class="right">
        <div class="who">Hey, <b id="who">athlete</b> 👋</div>
        <button class="logout-btn" onclick="logout()">Log out</button>
      </div>
    </div>

    <div class="dashboard">
      <!-- Sidebar: stats + add -->
      <div class="sidebar">
        <div>
          <div class="stats">
            <div class="stat">
              <div class="num" id="stat-count">0</div>
              <div class="label">Exercises</div>
            </div>
            <div class="stat">
              <div class="num" id="stat-reps">0</div>
              <div class="label">Total reps</div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-title">Add exercise</div>
          <div class="field">
            <label>Exercise</label>
            <input id="exercise" type="text" placeholder="Push Ups" />
          </div>
          <div class="field">
            <label>Reps</label>
            <input id="reps" type="number" placeholder="20" />
          </div>
          <button class="btn-primary" onclick="addWorkout()">Add to log</button>
          <p class="msg" id="add-msg"></p>
        </div>
      </div>

      <!-- Main: log -->
      <div class="panel">
        <div class="panel-title">Your log</div>
        <div id="list"><div class="empty">Loading…</div></div>
      </div>
    </div>
  </div>

</div>

<script>
  const API = 'https://workout-api-production-c1f1.up.railway.app'
  let token = localStorage.getItem('token')
  let mode = 'login'

  if (token) showApp()

  function toggleAuth() {
    mode = mode === 'login' ? 'register' : 'login'
    document.getElementById('auth-submit').textContent = mode === 'login' ? 'Sign in' : 'Create account'
    document.getElementById('auth-toggle').textContent = mode === 'login' ? 'New here? Create account' : 'Have an account? Sign in'
    document.getElementById('auth-msg').textContent = ''
  }

  async function submitAuth() {
    const username = document.getElementById('username').value.trim()
    const password = document.getElementById('password').value
    const msg = document.getElementById('auth-msg')
    if (!username || !password) { msg.className = 'msg error'; msg.textContent = 'Fill in both fields'; return }

    const endpoint = mode === 'login' ? '/login' : '/register'
    const res = await fetch(API + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    })

    if (mode === 'register') {
      if (res.ok) {
        msg.className = 'msg success'; msg.textContent = 'Account created — signing you in…'
        mode = 'login'; setTimeout(submitAuth, 600)
      } else { msg.className = 'msg error'; msg.textContent = await res.text() }
      return
    }
    if (res.ok) {
      const data = await res.json()
      token = data.token
      localStorage.setItem('token', token)
      localStorage.setItem('username', username)
      showApp()
    } else { msg.className = 'msg error'; msg.textContent = 'Wrong username or password' }
  }

  function showApp() {
    document.getElementById('auth').classList.add('hidden')
    document.getElementById('app').classList.remove('hidden')
    document.getElementById('who').textContent = localStorage.getItem('username') || 'athlete'
    loadWorkouts()
  }

  async function loadWorkouts() {
    const list = document.getElementById('list')
    const res = await fetch(API + '/workouts', { headers: { 'Authorization': 'Bearer ' + token } })
    if (!res.ok) { list.innerHTML = '<div class="empty">Failed to load</div>'; return }
    const workouts = await res.json()

    document.getElementById('stat-count').textContent = workouts.length
    document.getElementById('stat-reps').textContent = workouts.reduce((s, w) => s + w.reps, 0)

    if (workouts.length === 0) {
      list.innerHTML = '<div class="empty"><div class="big">💪</div>No exercises yet.<br>Add your first one on the left.</div>'
      return
    }
    list.innerHTML = workouts.map(w => `
      <div class="workout">
        <div class="left">
          <div class="icon">🔥</div>
          <div>
            <div class="name">${escapeHtml(w.exercise)}</div>
            <div class="reps"><b>${w.reps}</b> reps</div>
          </div>
        </div>
        <button class="btn-del" onclick="deleteWorkout(${w.id})">✕</button>
      </div>
    `).join('')
  }

  async function addWorkout() {
    const exercise = document.getElementById('exercise').value.trim()
    const reps = parseInt(document.getElementById('reps').value)
    const msg = document.getElementById('add-msg')
    if (!exercise || !reps) { msg.className = 'msg error'; msg.textContent = 'Enter exercise and reps'; return }

    const res = await fetch(API + '/workouts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ exercise, reps })
    })
    if (res.ok) {
      document.getElementById('exercise').value = ''
      document.getElementById('reps').value = ''
      msg.textContent = ''
      loadWorkouts()
    } else { msg.className = 'msg error'; msg.textContent = await res.text() }
  }

  async function deleteWorkout(id) {
    await fetch(API + '/workout?id=' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } })
    loadWorkouts()
  }

  function logout() {
    localStorage.removeItem('token'); localStorage.removeItem('username'); token = null
    document.getElementById('app').classList.add('hidden')
    document.getElementById('auth').classList.remove('hidden')
    document.getElementById('username').value = ''
    document.getElementById('password').value = ''
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
  }
</script>
</body>
</html>
