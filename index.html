<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0a18;
      --text: #f3f1fb;
      --text-dim: #9b97b8;
      --glass: rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.12);
      --c1: #a855f7;
      --c2: #ec4899;
      --c3: #6366f1;
      --danger: #ff6b8a;
      --radius: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* animated gradient mesh background */
    .mesh { position: fixed; inset: 0; z-index: 0; overflow: hidden; }
    .blob {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.55;
      animation: float 12s ease-in-out infinite;
      will-change: transform;
    }
    .blob.b1 { width: 420px; height: 420px; background: var(--c1); top: -120px; left: -80px; }
    .blob.b2 { width: 380px; height: 380px; background: var(--c2); bottom: -140px; right: -60px; animation-name: float2; animation-delay: -4s; }
    .blob.b3 { width: 320px; height: 320px; background: var(--c3); top: 40%; left: 55%; animation-name: float3; animation-delay: -8s; opacity: 0.4; }
    @keyframes float {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(160px,90px) scale(1.15); }
      66% { transform: translate(70px,180px) scale(0.9); }
    }
    @keyframes float2 {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(-140px,-70px) scale(1.2); }
      66% { transform: translate(-60px,-160px) scale(0.95); }
    }
    @keyframes float3 {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(-180px,120px) scale(1.25); }
    }

    .wrap { position: relative; z-index: 1; }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
    }

    /* ===== AUTH ===== */
    .auth-screen { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .auth-card { width: 100%; max-width: 390px; padding: 34px; }
    .brand { display: flex; align-items: center; gap: 13px; margin-bottom: 30px; }
    .logo {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      border-radius: 13px; display: grid; place-items: center;
      box-shadow: 0 8px 28px rgba(168,85,247,0.4);
    }
    .brand h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .brand .sub { font-size: 12px; color: var(--text-dim); font-weight: 500; }

    .field { margin-bottom: 15px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600; color: var(--text-dim);
      margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.6px;
    }
    input {
      width: 100%; padding: 13px 15px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--glass-border);
      border-radius: 12px; color: var(--text);
      font-size: 15px; font-family: inherit; outline: none;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    input:focus {
      border-color: rgba(168,85,247,0.6);
      box-shadow: 0 0 0 3px rgba(168,85,247,0.18);
      background: rgba(255,255,255,0.06);
    }
    input::placeholder { color: rgba(255,255,255,0.3); }

    button { font-family: inherit; cursor: pointer; border: none; border-radius: 12px; font-weight: 600; transition: transform .08s, filter .15s, background .15s, color .15s; }
    button:active { transform: scale(0.98); }
    .btn-primary {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      color: #fff; font-size: 15px; font-weight: 700; margin-top: 8px;
      box-shadow: 0 8px 24px rgba(168,85,247,0.3);
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-ghost {
      width: 100%; padding: 12px; background: transparent;
      color: var(--text-dim); border: 1px solid var(--glass-border);
      font-size: 14px; margin-top: 10px;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.05); color: var(--text); }

    .msg { font-size: 13px; margin-top: 12px; font-weight: 500; min-height: 18px; }
    .msg.error { color: var(--danger); }
    .msg.success { color: #c4b5fd; }

    /* ===== APP ===== */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 28px; margin: 0; border-radius: 0;
      border-left: none; border-right: none; border-top: none;
      position: sticky; top: 0; z-index: 5;
    }
    .topbar .left { display: flex; align-items: center; gap: 12px; }
    .topbar .logo { width: 38px; height: 38px; box-shadow: none; }
    .topbar h1 { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
    .topbar .right { display: flex; align-items: center; gap: 14px; }
    .topbar .who { font-size: 13px; color: var(--text-dim); font-weight: 500; }
    .topbar .who b { color: var(--text); font-weight: 600; }
    .logout-btn {
      background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border);
      color: var(--text-dim); padding: 9px 15px; font-size: 13px; border-radius: 10px;
    }
    .logout-btn:hover { color: var(--text); }

    .dashboard {
      max-width: 1060px; margin: 0 auto; padding: 28px;
      display: grid; grid-template-columns: 350px 1fr; gap: 22px; align-items: start;
    }
    @media (max-width: 820px) { .dashboard { grid-template-columns: 1fr; } }

    .sidebar { display: flex; flex-direction: column; gap: 22px; position: sticky; top: 92px; }
    .panel { padding: 24px; }
    .panel-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-dim); margin-bottom: 18px;
    }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
    .stat { padding: 18px; }
    .stat .num {
      font-size: 32px; font-weight: 800; letter-spacing: -1px; line-height: 1;
      background: linear-gradient(135deg, #d8b4fe, #f9a8d4);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .stat .label { font-size: 12px; color: var(--text-dim); font-weight: 500; margin-top: 6px; }

    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }

    .workout {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px; margin-bottom: 10px; border-radius: 13px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--glass-border);
      animation: slideIn .25s ease;
    }
    @keyframes slideIn { from { opacity:0; transform: translateY(8px);} to {opacity:1; transform: translateY(0);} }
    .workout:last-child { margin-bottom: 0; }
    .workout .left { display: flex; align-items: center; gap: 13px; }
    .workout .icon {
      width: 40px; height: 40px; border-radius: 11px;
      background: linear-gradient(135deg, rgba(168,85,247,0.25), rgba(236,72,153,0.25));
      display: grid; place-items: center;
    }
    .workout .name { font-size: 15px; font-weight: 600; }
    .workout .reps { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    .workout .reps b { color: #d8b4fe; font-weight: 700; }
    .btn-del {
      background: transparent; color: var(--text-dim);
      width: 36px; height: 36px; border-radius: 9px; display: grid; place-items: center;
    }
    .btn-del:hover { background: rgba(255,107,138,0.15); color: var(--danger); }

    .empty { text-align: center; padding: 56px 20px; color: var(--text-dim); font-size: 14px; }
    .empty svg { margin-bottom: 14px; opacity: 0.5; }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="mesh">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

<div class="wrap">

  <!-- ===== AUTH ===== -->
  <div id="auth" class="auth-screen">
    <div class="auth-card glass">
      <div class="brand">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M6 7v10M18 7v10M3 9v6M21 9v6M6 12h12"/></svg>
        </div>
        <div>
          <h1>Workout Tracker</h1>
          <div class="sub">Track every rep</div>
        </div>
      </div>

      <div class="field">
        <label>Username</label>
        <input id="username" type="text" placeholder="your_username" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••" />
      </div>

      <button class="btn-primary" id="auth-submit" onclick="submitAuth()">Sign in</button>
      <button class="btn-ghost" id="auth-toggle" onclick="toggleAuth()">New here? Create account</button>
      <p class="msg" id="auth-msg"></p>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="app" class="hidden">
    <div class="topbar glass">
      <div class="left">
        <div class="logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M6 7v10M18 7v10M3 9v6M21 9v6M6 12h12"/></svg>
        </div>
        <h1>Workout Tracker</h1>
      </div>
      <div class="right">
        <div class="who">Hey, <b id="who">athlete</b></div>
        <button class="logout-btn" onclick="logout()">Log out</button>
      </div>
    </div>

    <div class="dashboard">
      <div class="sidebar">
        <div class="stats">
          <div class="stat glass">
            <div class="num" id="stat-count">0</div>
            <div class="label">Exercises</div>
          </div>
          <div class="stat glass">
            <div class="num" id="stat-reps">0</div>
            <div class="label">Total reps</div>
          </div>
        </div>

        <div class="panel glass">
          <div class="panel-title">Add exercise</div>
          <div class="field">
            <label>Exercise</label>
            <input id="exercise" type="text" placeholder="Push Ups" />
          </div>
          <div class="field">
            <label>Reps</label>
            <input id="reps" type="number" placeholder="20" />
          </div>
          <button class="btn-primary" onclick="addWorkout()">Add to log</button>
          <p class="msg" id="add-msg"></p>
        </div>
      </div>

      <div class="panel glass">
        <div class="panel-title">Your log</div>
        <div id="list"><div class="empty">Loading…</div></div>
      </div>
    </div>
  </div>

</div>

<script>
  const API = 'https://workout-api-production-c1f1.up.railway.app'
  let token = localStorage.getItem('token')
  let mode = 'login'

  const dumbbell = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e9d5ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 7v10M18 7v10M4 10v4M20 10v4M6 12h12"/></svg>'

  if (token) showApp()

  function toggleAuth() {
    mode = mode === 'login' ? 'register' : 'login'
    document.getElementById('auth-submit').textContent = mode === 'login' ? 'Sign in' : 'Create account'
    document.getElementById('auth-toggle').textContent = mode === 'login' ? 'New here? Create account' : 'Have an account? Sign in'
    document.getElementById('auth-msg').textContent = ''
  }

  async function submitAuth() {
    const username = document.getElementById('username').value.trim()
    const password = document.getElementById('password').value
    const msg = document.getElementById('auth-msg')
    if (!username || !password) { msg.className = 'msg error'; msg.textContent = 'Fill in both fields'; return }

    const endpoint = mode === 'login' ? '/login' : '/register'
    const res = await fetch(API + endpoint, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    })
    if (mode === 'register') {
      if (res.ok) { msg.className = 'msg success'; msg.textContent = 'Account created — signing you in…'; mode = 'login'; setTimeout(submitAuth, 600) }
      else { msg.className = 'msg error'; msg.textContent = await res.text() }
      return
    }
    if (res.ok) {
      const data = await res.json()
      token = data.token
      localStorage.setItem('token', token); localStorage.setItem('username', username)
      showApp()
    } else { msg.className = 'msg error'; msg.textContent = 'Wrong username or password' }
  }

  function showApp() {
    document.getElementById('auth').classList.add('hidden')
    document.getElementById('app').classList.remove('hidden')
    document.getElementById('who').textContent = localStorage.getItem('username') || 'athlete'
    loadWorkouts()
  }

  async function loadWorkouts() {
    const list = document.getElementById('list')
    const res = await fetch(API + '/workouts', { headers: { 'Authorization': 'Bearer ' + token } })
    if (!res.ok) { list.innerHTML = '<div class="empty">Failed to load</div>'; return }
    const workouts = await res.json()

    document.getElementById('stat-count').textContent = workouts.length
    document.getElementById('stat-reps').textContent = workouts.reduce((s, w) => s + w.reps, 0)

    if (workouts.length === 0) {
      list.innerHTML = '<div class="empty"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 7v10M18 7v10M4 10v4M20 10v4M6 12h12"/></svg><br>No exercises yet.<br>Add your first one on the left.</div>'
      return
    }
    list.innerHTML = workouts.map(w => `
      <div class="workout">
        <div class="left">
          <div class="icon">${dumbbell}</div>
          <div>
            <div class="name">${escapeHtml(w.exercise)}</div>
            <div class="reps"><b>${w.reps}</b> reps</div>
          </div>
        </div>
        <button class="btn-del" onclick="deleteWorkout(${w.id})">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    `).join('')
  }

  async function addWorkout() {
    const exercise = document.getElementById('exercise').value.trim()
    const reps = parseInt(document.getElementById('reps').value)
    const msg = document.getElementById('add-msg')
    if (!exercise || !reps) { msg.className = 'msg error'; msg.textContent = 'Enter exercise and reps'; return }
    const res = await fetch(API + '/workouts', {
      method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ exercise, reps })
    })
    if (res.ok) {
      document.getElementById('exercise').value = ''; document.getElementById('reps').value = ''
      msg.textContent = ''; loadWorkouts()
    } else { msg.className = 'msg error'; msg.textContent = await res.text() }
  }

  async function deleteWorkout(id) {
    await fetch(API + '/workout?id=' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } })
    loadWorkouts()
  }

  function logout() {
    localStorage.removeItem('token'); localStorage.removeItem('username'); token = null
    document.getElementById('app').classList.add('hidden')
    document.getElementById('auth').classList.remove('hidden')
    document.getElementById('username').value = ''; document.getElementById('password').value = ''
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
  }
</script>
</body>
</html>
