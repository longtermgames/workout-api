<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0b;
      --surface: #141416;
      --surface-2: #1c1c1f;
      --border: #2a2a2e;
      --text: #f4f4f5;
      --text-dim: #8a8a90;
      --accent: #d4f23a;
      --accent-dim: #a8c22e;
      --danger: #ff4d4d;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px; left: 50%;
      transform: translateX(-50%);
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(212,242,58,0.08), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }
    .brand .logo {
      width: 44px; height: 44px;
      background: var(--accent);
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-size: 24px;
    }
    .brand h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .brand .sub {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 500;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 13px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px rgba(212,242,58,0.12);
    }
    input::placeholder { color: #55555c; }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      transition: transform .1s, background .15s, opacity .15s;
    }
    button:active { transform: scale(0.98); }

    .btn-primary {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0a0a0b;
      font-size: 15px;
      margin-top: 6px;
    }
    .btn-primary:hover { background: #e0ff4a; }

    .btn-ghost {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      font-size: 14px;
      margin-top: 10px;
    }
    .btn-ghost:hover { background: var(--surface-2); color: var(--text); }

    .btn-del {
      background: transparent;
      color: var(--text-dim);
      padding: 8px;
      border-radius: 8px;
      font-size: 18px;
      line-height: 1;
      width: 36px; height: 36px;
    }
    .btn-del:hover { background: rgba(255,77,77,0.12); color: var(--danger); }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 20px;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
    }
    .stat .num {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--accent);
    }
    .stat .label {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 500;
      margin-top: 4px;
    }

    .workout {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      animation: slideIn .25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .workout:last-child { margin-bottom: 0; }
    .workout .left { display: flex; align-items: center; gap: 14px; }
    .workout .icon {
      width: 40px; height: 40px;
      background: rgba(212,242,58,0.1);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
    }
    .workout .name { font-size: 15px; font-weight: 600; }
    .workout .reps { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
    .workout .reps b { color: var(--accent); font-weight: 700; }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
      font-size: 14px;
    }
    .empty .big { font-size: 36px; margin-bottom: 12px; }

    .msg { font-size: 13px; margin-top: 12px; font-weight: 500; }
    .msg.error { color: var(--danger); }
    .msg.success { color: var(--accent); }

    .row { display: flex; gap: 12px; }
    .row .field { flex: 1; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .topbar .hi { font-size: 15px; font-weight: 600; }
    .topbar .hi span { color: var(--text-dim); font-weight: 500; }
    .logout-btn {
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 8px 14px;
      font-size: 13px;
    }
    .logout-btn:hover { color: var(--text); }

    .hidden { display: none; }
  </style>
</head>
<body>
<div class="container">

  <div class="brand">
    <div class="logo">🏋️</div>
    <div>
      <h1>Workout Tracker</h1>
      <div class="sub">Track every rep</div>
    </div>
  </div>

  <!-- AUTH -->
  <div id="auth">
    <div class="card">
      <div class="card-title" id="auth-title">Sign in</div>

      <div class="field">
        <label>Username</label>
        <input id="username" type="text" placeholder="your_username" />
      </div>
      <div class="field">
        <label>Password</label>
        <input id="password" type="password" placeholder="••••••••" />
      </div>

      <button class="btn-primary" id="auth-submit" onclick="submitAuth()">Sign in</button>
      <button class="btn-ghost" id="auth-toggle" onclick="toggleAuth()">New here? Create account</button>
      <p class="msg" id="auth-msg"></p>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <div class="topbar">
      <div class="hi">Hey, <span id="who">athlete</span> 👋</div>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="num" id="stat-count">0</div>
        <div class="label">Exercises</div>
      </div>
      <div class="stat">
        <div class="num" id="stat-reps">0</div>
        <div class="label">Total reps</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Add exercise</div>
      <div class="row">
        <div class="field">
          <label>Exercise</label>
          <input id="exercise" type="text" placeholder="Push Ups" />
        </div>
        <div class="field" style="max-width:120px">
          <label>Reps</label>
          <input id="reps" type="number" placeholder="20" />
        </div>
      </div>
      <button class="btn-primary" onclick="addWorkout()">Add to log</button>
      <p class="msg" id="add-msg"></p>
    </div>

    <div class="card">
      <div class="card-title">Your log</div>
      <div id="list"><div class="empty">Loading…</div></div>
    </div>
  </div>

</div>

<script>
  const API = 'https://workout-api-production-c1f1.up.railway.app'
  let token = localStorage.getItem('token')
  let mode = 'login'

  if (token) showApp()

  function toggleAuth() {
    mode = mode === 'login' ? 'register' : 'login'
    document.getElementById('auth-title').textContent = mode === 'login' ? 'Sign in' : 'Create account'
    document.getElementById('auth-submit').textContent = mode === 'login' ? 'Sign in' : 'Create account'
    document.getElementById('auth-toggle').textContent = mode === 'login' ? 'New here? Create account' : 'Have an account? Sign in'
    document.getElementById('auth-msg').textContent = ''
  }

  async function submitAuth() {
    const username = document.getElementById('username').value.trim()
    const password = document.getElementById('password').value
    const msg = document.getElementById('auth-msg')

    if (!username || !password) {
      msg.className = 'msg error'; msg.textContent = 'Fill in both fields'; return
    }

    const endpoint = mode === 'login' ? '/login' : '/register'
    const res = await fetch(API + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    })

    if (mode === 'register') {
      if (res.ok) {
        msg.className = 'msg success'; msg.textContent = 'Account created — signing you in…'
        mode = 'login'
        setTimeout(submitAuth, 600)
      } else {
        msg.className = 'msg error'; msg.textContent = await res.text()
      }
      return
    }

    if (res.ok) {
      const data = await res.json()
      token = data.token
      localStorage.setItem('token', token)
      localStorage.setItem('username', username)
      showApp()
    } else {
      msg.className = 'msg error'; msg.textContent = 'Wrong username or password'
    }
  }

  function showApp() {
    document.getElementById('auth').classList.add('hidden')
    document.getElementById('app').classList.remove('hidden')
    document.getElementById('who').textContent = localStorage.getItem('username') || 'athlete'
    loadWorkouts()
  }

  async function loadWorkouts() {
    const list = document.getElementById('list')
    const res = await fetch(API + '/workouts', {
      headers: { 'Authorization': 'Bearer ' + token }
    })
    if (!res.ok) { list.innerHTML = '<div class="empty">Failed to load</div>'; return }

    const workouts = await res.json()

    document.getElementById('stat-count').textContent = workouts.length
    document.getElementById('stat-reps').textContent = workouts.reduce((s, w) => s + w.reps, 0)

    if (workouts.length === 0) {
      list.innerHTML = '<div class="empty"><div class="big">💪</div>No exercises yet.<br>Add your first one above.</div>'
      return
    }

    list.innerHTML = workouts.map(w => `
      <div class="workout">
        <div class="left">
          <div class="icon">🔥</div>
          <div>
            <div class="name">${escapeHtml(w.exercise)}</div>
            <div class="reps"><b>${w.reps}</b> reps</div>
          </div>
        </div>
        <button class="btn-del" onclick="deleteWorkout(${w.id})">✕</button>
      </div>
    `).join('')
  }

  async function addWorkout() {
    const exercise = document.getElementById('exercise').value.trim()
    const reps = parseInt(document.getElementById('reps').value)
    const msg = document.getElementById('add-msg')

    if (!exercise || !reps) {
      msg.className = 'msg error'; msg.textContent = 'Enter exercise and reps'; return
    }

    const res = await fetch(API + '/workouts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ exercise, reps })
    })

    if (res.ok) {
      document.getElementById('exercise').value = ''
      document.getElementById('reps').value = ''
      msg.textContent = ''
      loadWorkouts()
    } else {
      msg.className = 'msg error'; msg.textContent = await res.text()
    }
  }

  async function deleteWorkout(id) {
    await fetch(API + '/workout?id=' + id, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    })
    loadWorkouts()
  }

  function logout() {
    localStorage.removeItem('token')
    localStorage.removeItem('username')
    token = null
    document.getElementById('app').classList.add('hidden')
    document.getElementById('auth').classList.remove('hidden')
    document.getElementById('username').value = ''
    document.getElementById('password').value = ''
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
  }
</script>
</body>
</html>
